version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: recipe-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recipedb}
      POSTGRES_USER: ${POSTGRES_USER:-recipeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recipepass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recipeuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipe-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-5000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-recipeuser}:${POSTGRES_PASSWORD:-recipepass}@postgres:5432/${POSTGRES_DB:-recipedb}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    volumes:
      - recipe_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: recipe-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  recipe_uploads:
    driver: local

networks:
  default:
    name: recipe-network
